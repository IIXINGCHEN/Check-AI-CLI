name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid tag format: ${GITHUB_REF_NAME}. Expected vX.Y.Z" >&2
            exit 1
          }

      - name: Verify tag commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main" || {
            echo "Tagged commit is not contained in origin/main" >&2
            exit 1
          }

      - name: Verify checksums
        shell: pwsh
        run: ./tools/Update-Checksums.ps1 -Check

      - name: Collect release metadata
        id: metadata
        shell: pwsh
        run: |
          ./tools/Get-ReleaseAssets.ps1 -Mode Assets -OutputPath release-assets.txt
          ./tools/Get-ReleaseAssets.ps1 -Mode Intro -Tag "${{ github.ref_name }}" -OutputPath release-intro.md

          $assets = [IO.File]::ReadAllText('release-assets.txt').TrimEnd("`r", "`n")
          "assets<<EOF" >> $env:GITHUB_OUTPUT
          $assets >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Fail if release already exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: context.ref.replace('refs/tags/', '')
              });
              core.setFailed('Release already exists for this tag.');
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Generate release body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const intro = fs.readFileSync('release-intro.md', 'utf8').trimEnd();
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              target_commitish: context.sha
            });
            const body = `${intro}\n\n---\n\n${response.data.body.trim()}\n`;
            fs.writeFileSync('release-body.md', body);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: ${{ steps.metadata.outputs.assets }}
          fail_on_unmatched_files: true
