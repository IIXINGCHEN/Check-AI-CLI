name: update-checksums

on:
  push:
    branches: ["main"]
    paths:
      - "distribution-files.txt"
      - "install.ps1"
      - "install.sh"
      - "uninstall.ps1"
      - "uninstall.sh"
      - "bin/**"
      - "scripts/**"
      - "tools/PSModulePath.ps1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-checksums-main
  cancel-in-progress: true

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate checksums from committed payload
        shell: pwsh
        run: |
          git add -- distribution-files.txt install.ps1 install.sh uninstall.ps1 uninstall.sh bin scripts tools/PSModulePath.ps1
          ./tools/Update-Checksums.ps1
          ./tools/Update-Checksums.ps1 -Check

      - name: Commit updated manifest
        shell: pwsh
        run: |
          git diff --quiet -- checksums.sha256
          $manifestChanged = $LASTEXITCODE -ne 0
          if ($manifestChanged) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add checksums.sha256
            git commit -m "chore: update distribution checksums"
            git push origin HEAD:main
          } else {
            Write-Host "checksums.sha256 is already current."
          }
